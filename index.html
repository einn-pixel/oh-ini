<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChiFind</title>

<style>
body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
text-align:center;
}

h1{
font-size:50px;
margin-bottom:20px;
color:#38bdf8;
}

input{
padding:12px;
width:300px;
border-radius:25px;
border:none;
outline:none;
}

button{
padding:12px 20px;
border:none;
border-radius:25px;
background:#38bdf8;
color:white;
cursor:pointer;
margin-left:10px;
}

button:hover{
background:#0ea5e9;
}
</style>

</head>

<body>

<div class="container">

<h1> ChiFind</h1>

<form action="https://www.google.com/search" method="GET">

<input type="text" name="q" placeholder="Cari apa saja..." required>

<button type="submit">Search</button>

</form>

</div>

</body>
</html>
